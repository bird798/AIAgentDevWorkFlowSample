name: AI Agent 자동 실행

on:
  issues:
    types: [labeled]

jobs:
  architect-agent:
    if: github.event.label.name == '기획'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm install -g @anthropic-ai/claude-code
      - name: Architect Agent 실행
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          cd agents/architect
          claude --print "Issue #${{ github.event.issue.number }} 분석 후 Sub-issue 생성" --allowedTools "Bash" --dangerously-skip-permissions

  developer-agent:
    if: github.event.label.name == 'Sub-issue'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm install -g @anthropic-ai/claude-code
      - name: Developer Agent 실행
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          cd agents/developer
          claude --print "Issue #${{ github.event.issue.number }} 구현 후 PR 생성" --allowedTools "Bash,Write" --dangerously-skip-permissions
